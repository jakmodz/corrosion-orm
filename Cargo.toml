[workspace]
members = [
"crates/cargo-orm-core",
"crates/cargo-orm-macros",
"crates/cargo-orm-test"]

[workspace.package]
resolver = "3"

[workspace.dependencies]
syn = { version = "2.0", features = ["full"] }
quote = "1.0"
proc-macro2 = "1.0"
deluxe = "0.5.0"
anyhow = "1.0.100"
log = "0.4.29"
chrono = "=0.4.9"
